tracker:
  _target_: src.modules.samara_fixed.SamaraFixed
  iou_threshold: 0.5
  pred_iou_threshold: -1
  trainer_config_path: conf/offline_trainers/experiment_6/cnn_fixed_samara_memory_20_upsample_hard.yaml

  model:
    _target_: src.modules.samara_hiera_model.SamaraHieraModel
    sam_model_path: tm/sam_large.pt
    crop_resize: 512
    pad_ratio: 0.25
    token_source: memory

  main_memory:
    _target_: src.modules.memories.main_memory.MainMemory
    max_memory_history: 6
    max_pointer_history: 15

experiment:
  _target_: src.experiments.tracking_experiment.TrackingExperiment
  resolution: 1024
  experiment_name: samara_fixed_memory_20_upsample_hard
  video_path: data/visualize/experiment_6/samara_fixed_memory_20_upsample_hard
